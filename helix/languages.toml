[language-server.eslint]
args = ["--stdio"]
command = "vscode-eslint-language-server"

[language-server.eslint.config]
validate = "on"
experimental = { useFlatConfig = false }
rulesCustomizations = []
run = "onType"
problems = { shortenToSingleLine = false }
nodePath = ""
workingDirectory = { mode = "location", directory = "$CWD" }

[language-server.eslint.config.codeAction]
[language-server.eslint.config.codeAction.disableRuleComment]
enable = true
location = "separateLine"

[language-server.eslint.config.codeAction.showDocumentation]
enable = true

[language-server.eslint.config.codeActionOnSave]
enable = true
mode = "fixAll"

[language-server.typescript-language-server.config]
documentFormatting = false

[[language]]
name = "html"
formatter = { command = "npx", args = ["prettier", "--parser", "html"] }
auto-format = false

[[language]]
name = "json"
formatter = { command = "npx", args = ["prettier", "--parser", "json"] }

[[language]]
name = "css"
formatter = { command = "npx", args = ["prettier", "--parser", "css"] }
auto-format = false

[[language]]
name = "javascript"
formatter = { command = "npx", args = ["prettier", "--parser", "typescript"] }
language-servers = [{ name = "typescript-language-server", except-features = [ "format" ] }, "eslint"]
auto-format = true

# [language-server.local-tsserver]
