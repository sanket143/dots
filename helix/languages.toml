[[language]]
name = "typescript"
formatter = { command = "npx", args = ["prettier", "--parser", "typescript"] }
# language-servers = [{ name = "typescript-language-server", except-features = [ "format" ] }, "eslint"]
language-servers = [{ name = "typescript-language-server", except-features = [ "format" ] } ]
auto-format = true

[language-server.rust-analyzer.config.check]
command = "clippy"

[[language]]
name = "lua"
auto-format = true

[language-server.lua-language-server.config.Lua]
diagnostics = { globals = ["love"] }

